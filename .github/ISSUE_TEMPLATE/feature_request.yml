name: Feature Request / 功能请求
description: 提议一个新功能或改进 / Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出新功能建议！建议先在 [Discussions](https://github.com/LittleBunVerse/forge/discussions) 讨论达成共识后再开 Issue。
        Thanks for the suggestion! Consider discussing in [Discussions](https://github.com/LittleBunVerse/forge/discussions) first to gather feedback.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前检查 / Pre-submission checklist
      options:
        - label: 我已搜索现有 Issues 与 Discussions 确认这不是重复请求 / I searched and this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem Statement
      description: 你遇到了什么问题？这个功能能帮谁？/ What problem are you trying to solve? Who would benefit?
      placeholder: "例：我有 50+ 个项目，每次在列表里找项目很慢..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的方案 / Proposed Solution
      description: 你希望如何实现？/ How would you like it to work?
      placeholder: "例：在项目列表界面增加模糊搜索功能，按下 / 即可输入..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 你考虑过哪些其他方案？/ What alternatives have you considered?

  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围 / Scope
      multiple: true
      options:
        - TUI 交互 / TUI Interface
        - CLI 命令 / CLI Commands
        - 配置系统 / Configuration
        - 目录扫描 / Directory Scanning
        - 命令执行 / Command Execution
        - 安装脚本 / Install Scripts
        - 文档 / Documentation
        - 其他 / Other

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议 / Suggested Priority
      options:
        - 低 / Low（nice-to-have）
        - 中 / Medium
        - 高 / High（影响核心体验）
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: 贡献意愿 / Willing to Contribute
      options:
        - label: 我愿意提交 PR 实现这个功能 / I'm willing to submit a PR
        - label: 我愿意参与方案讨论 / I'm willing to discuss the design
