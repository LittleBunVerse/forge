name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: 格式与静态检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2

      - name: Rust 格式检查
        run: cargo fmt --check

      - name: Clippy 检查
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Shell 安装脚本语法检查
        run: bash -n "./scripts/install.sh"

  test:
    name: 单元测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2

      - name: 运行单元测试
        run: cargo test -- --test-threads=1

      - name: PowerShell 安装脚本语法检查
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw "./scripts/install.ps1"))
