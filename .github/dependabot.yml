version: 2
updates:
  # -----------------------------------------------------------------
  # Rust / Cargo 依赖
  # -----------------------------------------------------------------
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      rust-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # -----------------------------------------------------------------
  # GitHub Actions
  # -----------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
